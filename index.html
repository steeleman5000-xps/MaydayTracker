<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Restore path redirected by 404.html
      (function() {
        var q = window.location.search;
        if (q && q[1] === '/') {
          var path = q.slice(2).replace(/~and~/g, '&');
          window.history.replaceState(null, null, '/' + path + window.location.hash);
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/flag.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Mayday Golf</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
