<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    // SPA redirect: sends static-host 404s back to index.html with the path preserved
    var l = window.location;
    l.replace(l.origin + '/?/' + l.pathname.slice(1) + l.search + l.hash);
  </script>
</head>
<body></body>
</html>
